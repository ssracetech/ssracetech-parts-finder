<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SS Racetech Parts Finder</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🏁 SS RACETECH</h1>

    <h2>AI Parts Finder</h2>

    <p>
        Ask me anything about Speedflow, Proflow, LS, fittings,
        transmission parts and more.
    </p>

    <div class="chat-box">

        <div id="messages">

            <div class="bot">
                👋 Hi! I'm the SS Racetech Parts Finder.
                <br><br>
                Try asking:
                <br>
                • I need a -6AN fitting
                <br>
                • LS1 starter motor
                <br>
                • Transmission cooler
            </div>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="userInput"
                placeholder="Ask me anything..."
            >

            <button id="sendBtn">
                Send
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
